version: "3.9"

services:
  wm-watcher:
    build:
      context: ..               # project root (so COPY works for all sub-folders)
      dockerfile: watcher_service/Dockerfile
    image: wm-watcher:latest
    container_name: wm-watcher

    # GPU access
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    # .env file (copy .env.example → .env and fill values)
    env_file:
      - .env

    # Override paths inside container (host paths from .env are only for volume mounts)
    environment:
      - INPUT_FOLDER=/data/input
      - OUTPUT_FOLDER=/data/output
      - DB_PATH=/data/db/watermarks.db
      - ERROR_LOG=/data/db/error.log
      - STATS_CSV=/data/db/stats.csv
      # AudioSeal cache → dùng thư mục persist, không download lại
      - AUDIOSEAL_CACHE_DIR=/data/model_cache/audioseal
      # Offline mode — chặn mọi HuggingFace network call
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1

    volumes:
      # Input videos (read-only from host) — UNC path for network share
      - //10.41.185.66/OUTPUT:/data/input:ro

      # Watermarked output videos
      - ${OUTPUT_FOLDER}:/data/output

      # DB, error.log, stats.csv — persisted on host
      - ${DATA_DIR:-./data/db}:/data/db

      # Model checkpoints from host (read-only)
      - ../output:/app/output:ro

      # Model cache — AudioSeal + HuggingFace, persisted across restarts
      - ${MODEL_CACHE_DIR:-./data/model_cache}:/data/model_cache

      # ── Source code mount (dev mode) ──────────────────────────────────────
      # Comment lại khi deploy production (dùng code đã baked vào image).
      - ../videoseal:/app/videoseal
      - ../audioseal:/app/audioseal
      - ../web_demo:/app/web_demo
      - ../configs:/app/configs
      - ./service.py:/app/watcher_service/service.py
      - ./worker.py:/app/watcher_service/worker.py
      - ./db.py:/app/watcher_service/db.py

    restart: unless-stopped

    # Healthcheck: just verify the process is alive
    healthcheck:
      test: ["CMD", "python", "-c", "import os; open('/data/db/watermarks.db')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Extract / Verify web UI ──────────────────────────────────────────────────
  wm-extract:
    image: wm-watcher:latest          # same image, different command
    container_name: wm-extract
    depends_on:
      - wm-watcher

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    environment:
      - DEVICE=cuda
      - CKPT_PATH=output/run2_video/checkpoint350.pth
      - WATCHER_DB=/data/db/watermarks.db
      - MATCH_THRESHOLD=0.70
      - MAX_FRAMES=900
      - AUDIOSEAL_CACHE_DIR=/data/model_cache/audioseal
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - PYTHONUNBUFFERED=1
      - NO_TORCH_COMPILE=1

    volumes:
      # DB (read from watcher's DB)
      - ${DATA_DIR:-./data/db}:/data/db:ro

      # Model checkpoints
      - ../output:/app/output:ro

      # Model cache (AudioSeal detector)
      - ${MODEL_CACHE_DIR:-./data/model_cache}:/data/model_cache

      # Upload folder (temp, inside container is fine)

      # ── Source code mount (dev mode) ────────────────────────────────────
      - ../videoseal:/app/videoseal
      - ../audioseal:/app/audioseal
      - ../web_demo:/app/web_demo
      - ../configs:/app/configs
      - ../extract_app:/app/extract_app

    ports:
      - "5001:5001"

    restart: unless-stopped

    command: ["python", "extract_app/app.py"]

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # ── Monitor web UI — cổng 5002 ───────────────────────────────────────────────
  wm-monitor:
    image: wm-watcher:latest
    container_name: wm-monitor
    depends_on:
      - wm-watcher

    environment:
      - DB_PATH=/data/db/watermarks.db
      - PYTHONUNBUFFERED=1

    volumes:
      - ${DATA_DIR:-./data/db}:/data/db:ro
      - ./monitor.py:/app/watcher_service/monitor.py

    ports:
      - "5002:5002"

    restart: unless-stopped

    command: ["python", "watcher_service/monitor.py"]
